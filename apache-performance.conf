# Apache performance tuning — only uses modules available by default
# in the php:8.2-apache image.

# Browser caching for static assets (mod_expires is available)
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType text/css "access plus 1 year"
    ExpiresByType application/javascript "access plus 1 year"
    ExpiresByType image/jpeg "access plus 1 year"
    ExpiresByType image/png "access plus 1 year"
    ExpiresByType image/gif "access plus 1 year"
    ExpiresByType image/svg+xml "access plus 1 year"
    ExpiresByType image/x-icon "access plus 1 year"
    ExpiresByType font/woff "access plus 1 year"
    ExpiresByType font/woff2 "access plus 1 year"
    ExpiresByType application/pdf "access plus 1 month"
</IfModule>

# Prefork MPM tuning — optimized for Railway 512MB RAM
# Fewer workers = less memory usage. Each Apache worker uses ~20-30MB.
# With 256MB PHP memory_limit, we can only afford ~4-5 concurrent workers.
<IfModule mpm_prefork_module>
    StartServers             2
    MinSpareServers          2
    MaxSpareServers          4
    MaxRequestWorkers        8
    MaxConnectionsPerChild   500
</IfModule>
